name: Build and Push OfficeQA Purple Agent

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.officeqa-agent -t ghcr.io/n8vember/officeqa-purple:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/n8vember/officeqa-purple:latest
